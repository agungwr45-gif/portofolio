<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackton Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 40px 20px; }
  h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #888; }
  .preview-box { background: var(--bg, #ffffff); border-radius: 24px; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 40px rgba(0,0,0,0.1); transition: background 0.3s; }
  .preview-box svg { width: 200px; height: 200px; }
  .controls { display: flex; flex-direction: column; gap: 20px; width: 320px; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
  .control-row { display: flex; align-items: center; justify-content: space-between; }
  label { font-size: 13px; font-weight: 500; color: #333; }
  input[type="color"] { width: 48px; height: 32px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; background: #f0f0f0; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .preset { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
  .preset:hover { transform: scale(1.1); border-color: #ccc; }
  .download-btn { background: #111; color: white; border: none; border-radius: 10px; padding: 12px 24px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; letter-spacing: 0.05em; transition: background 0.2s; }
  .download-btn:hover { background: #333; }
  .divider { height: 1px; background: #f0f0f0; }
</style>
</head>
<body>

<h1>Jackton — Logo Preview</h1>

<div class="preview-box" id="previewBox">
  <svg id="logoSvg" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <g id="logoGroup" transform="translate(0,1024) scale(0.1,-0.1)" fill="#000000" stroke="none">
      <path d="M4105 8175 c-282 -62 -509 -283 -587 -570 -20 -77 -21 -101 -22 -560 l-1 -480 247 -3 247 -2 3 457 c3 453 3 458 26 508 30 65 75 112 137 141 50 24 52 24 409 24 337 0 358 -1 351 -17 -39 -94 -40 -115 -40 -636 l0 -508 72 -28 c137 -54 252 -130 360 -237 l62 -63 3 637 3 637 27 51 c28 53 85 111 140 141 31 17 80 18 728 21 527 2 706 0 740 -9 56 -16 149 -105 170 -164 11 -32 15 -137 17 -516 l4 -476 42 -12 c123 -36 293 -146 395 -254 29 -32 54 -57 55 -57 1 0 0 312 -3 692 l-5 693 -26 70 c-102 274 -287 447 -553 515 -78 20 -105 20 -1510 19 -1146 0 -1443 -3 -1491 -14z"/>
      <path d="M5810 6713 c0 -849 0 -837 -70 -980 -75 -152 -220 -277 -384 -329 -66 -21 -112 -27 -251 -35 -261 -13 -416 -55 -602 -161 -201 -115 -397 -332 -474 -526 -44 -112 -79 -170 -124 -210 -76 -66 -105 -72 -376 -72 -131 0 -273 -5 -316 -11 -267 -37 -486 -198 -597 -441 -64 -139 -66 -161 -66 -723 0 -574 1 -587 75 -740 94 -194 245 -326 460 -402 l80 -28 761 -3 c870 -3 843 -5 1010 78 189 93 331 256 393 451 34 108 41 216 41 669 0 416 1 437 21 480 26 58 72 105 134 138 l50 27 755 5 755 5 80 28 c229 80 407 257 489 485 l31 87 3 585 c3 671 4 664 -80 832 -92 184 -262 330 -458 394 -46 14 -107 18 -365 23 -295 6 -312 7 -352 29 -48 25 -89 74 -109 129 -10 30 -13 141 -14 506 l0 467 -250 0 -250 0 0 -757z m1211 -888 c80 -28 140 -99 164 -193 14 -53 16 -130 13 -544 -3 -433 -5 -487 -20 -521 -28 -62 -75 -114 -126 -139 l-47 -23 -740 -5 c-717 -6 -742 -6 -816 -27 -86 -24 -177 -67 -259 -123 -110 -74 -233 -231 -275 -350 -49 -137 -48 -129 -54 -660 -6 -461 -8 -508 -24 -541 -26 -51 -84 -108 -137 -133 -44 -21 -53 -21 -740 -21 l-695 0 -52 24 c-63 28 -124 91 -147 152 -15 39 -16 93 -14 514 3 525 1 504 76 580 75 76 94 80 382 80 253 0 255 0 300 -25 51 -29 97 -90 110 -146 5 -21 10 -247 10 -501 l0 -463 250 0 250 0 0 749 c0 833 1 844 65 979 69 145 175 250 320 317 98 46 194 65 322 65 245 0 457 62 656 193 204 134 366 338 447 565 29 79 96 157 165 188 48 23 59 24 311 24 209 0 269 -3 305 -15z"/>
      <path d="M3121 6320 c-136 -36 -255 -105 -352 -202 -66 -68 -101 -118 -149 -220 -70 -146 -70 -139 -70 -933 l0 -710 58 61 c102 108 253 204 390 248 l52 18 0 520 c0 378 3 532 12 562 16 55 109 148 164 164 31 9 221 12 735 12 650 0 697 -2 734 -19 85 -38 148 -117 163 -202 7 -39 11 -44 32 -42 14 1 99 6 190 11 169 10 266 31 277 60 9 22 -33 178 -67 250 -89 191 -253 338 -455 409 l-80 28 -780 2 c-745 2 -783 1 -854 -17z"/>
      <path d="M6280 3222 c0 -510 -1 -520 -71 -592 -78 -80 -97 -85 -399 -88 l-264 -2 -26 -73 c-50 -136 -124 -249 -230 -351 l-69 -67 482 3 482 3 80 28 c108 38 178 77 249 137 141 121 227 272 255 450 7 39 11 254 11 533 l0 467 -250 0 -250 0 0 -448z"/>
    </g>
  </svg>
</div>

<div class="controls">
  <div class="control-row">
    <label>Warna Logo</label>
    <input type="color" id="logoColor" value="#000000">
  </div>
  <div class="divider"></div>
  <div class="control-row">
    <label>Background</label>
    <input type="color" id="bgColor" value="#ffffff">
  </div>
  <div class="divider"></div>
  <div>
    <label style="display:block;margin-bottom:10px">Preset Warna</label>
    <div class="presets" id="presets"></div>
  </div>
  <div class="divider"></div>
  <button class="download-btn" onclick="downloadSVG()">⬇ Download SVG</button>
</div>

<script>
  const presets = [
    { logo: '#000000', bg: '#ffffff', label: 'Classic' },
    { logo: '#ffffff', bg: '#000000', label: 'Dark' },
    { logo: '#ffffff', bg: '#1a1a2e', label: 'Navy' },
    { logo: '#d4af37', bg: '#000000', label: 'Gold' },
    { logo: '#ffffff', bg: '#c0392b', label: 'Red' },
    { logo: '#2c3e50', bg: '#ecf0f1', label: 'Slate' },
    { logo: '#ffffff', bg: '#27ae60', label: 'Green' },
    { logo: '#e74c3c', bg: '#ffffff', label: 'Red on White' },
  ];

  const presetsContainer = document.getElementById('presets');
  presets.forEach(p => {
    const div = document.createElement('div');
    div.className = 'preset';
    div.style.background = p.logo;
    div.style.border = `3px solid ${p.bg === '#ffffff' ? '#ddd' : p.bg}`;
    div.title = p.label;
    div.onclick = () => {
      document.getElementById('logoColor').value = p.logo;
      document.getElementById('bgColor').value = p.bg;
      applyColors();
    };
    presetsContainer.appendChild(div);
  });

  function applyColors() {
    const logo = document.getElementById('logoColor').value;
    const bg = document.getElementById('bgColor').value;
    document.getElementById('logoGroup').setAttribute('fill', logo);
    document.getElementById('previewBox').style.background = bg;
  }

  document.getElementById('logoColor').addEventListener('input', applyColors);
  document.getElementById('bgColor').addEventListener('input', applyColors);

  function downloadSVG() {
    const logo = document.getElementById('logoColor').value;
    const bg = document.getElementById('bgColor').value;
    const svgContent = `<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="${bg}"/>
  <g transform="translate(0,1024) scale(0.1,-0.1)" fill="${logo}" stroke="none">
    <path d="M4105 8175 c-282 -62 -509 -283 -587 -570 -20 -77 -21 -101 -22 -560 l-1 -480 247 -3 247 -2 3 457 c3 453 3 458 26 508 30 65 75 112 137 141 50 24 52 24 409 24 337 0 358 -1 351 -17 -39 -94 -40 -115 -40 -636 l0 -508 72 -28 c137 -54 252 -130 360 -237 l62 -63 3 637 3 637 27 51 c28 53 85 111 140 141 31 17 80 18 728 21 527 2 706 0 740 -9 56 -16 149 -105 170 -164 11 -32 15 -137 17 -516 l4 -476 42 -12 c123 -36 293 -146 395 -254 29 -32 54 -57 55 -57 1 0 0 312 -3 692 l-5 693 -26 70 c-102 274 -287 447 -553 515 -78 20 -105 20 -1510 19 -1146 0 -1443 -3 -1491 -14z"/>
    <path d="M5810 6713 c0 -849 0 -837 -70 -980 -75 -152 -220 -277 -384 -329 -66 -21 -112 -27 -251 -35 -261 -13 -416 -55 -602 -161 -201 -115 -397 -332 -474 -526 -44 -112 -79 -170 -124 -210 -76 -66 -105 -72 -376 -72 -131 0 -273 -5 -316 -11 -267 -37 -486 -198 -597 -441 -64 -139 -66 -161 -66 -723 0 -574 1 -587 75 -740 94 -194 245 -326 460 -402 l80 -28 761 -3 c870 -3 843 -5 1010 78 189 93 331 256 393 451 34 108 41 216 41 669 0 416 1 437 21 480 26 58 72 105 134 138 l50 27 755 5 755 5 80 28 c229 80 407 257 489 485 l31 87 3 585 c3 671 4 664 -80 832 -92 184 -262 330 -458 394 -46 14 -107 18 -365 23 -295 6 -312 7 -352 29 -48 25 -89 74 -109 129 -10 30 -13 141 -14 506 l0 467 -250 0 -250 0 0 -757z m1211 -888 c80 -28 140 -99 164 -193 14 -53 16 -130 13 -544 -3 -433 -5 -487 -20 -521 -28 -62 -75 -114 -126 -139 l-47 -23 -740 -5 c-717 -6 -742 -6 -816 -27 -86 -24 -177 -67 -259 -123 -110 -74 -233 -231 -275 -350 -49 -137 -48 -129 -54 -660 -6 -461 -8 -508 -24 -541 -26 -51 -84 -108 -137 -133 -44 -21 -53 -21 -740 -21 l-695 0 -52 24 c-63 28 -124 91 -147 152 -15 39 -16 93 -14 514 3 525 1 504 76 580 75 76 94 80 382 80 253 0 255 0 300 -25 51 -29 97 -90 110 -146 5 -21 10 -247 10 -501 l0 -463 250 0 250 0 0 749 c0 833 1 844 65 979 69 145 175 250 320 317 98 46 194 65 322 65 245 0 457 62 656 193 204 134 366 338 447 565 29 79 96 157 165 188 48 23 59 24 311 24 209 0 269 -3 305 -15z"/>
    <path d="M3121 6320 c-136 -36 -255 -105 -352 -202 -66 -68 -101 -118 -149 -220 -70 -146 -70 -139 -70 -933 l0 -710 58 61 c102 108 253 204 390 248 l52 18 0 520 c0 378 3 532 12 562 16 55 109 148 164 164 31 9 221 12 735 12 650 0 697 -2 734 -19 85 -38 148 -117 163 -202 7 -39 11 -44 32 -42 14 1 99 6 190 11 169 10 266 31 277 60 9 22 -33 178 -67 250 -89 191 -253 338 -455 409 l-80 28 -780 2 c-745 2 -783 1 -854 -17z"/>
    <path d="M6280 3222 c0 -510 -1 -520 -71 -592 -78 -80 -97 -85 -399 -88 l-264 -2 -26 -73 c-50 -136 -124 -249 -230 -351 l-69 -67 482 3 482 3 80 28 c108 38 178 77 249 137 141 121 227 272 255 450 7 39 11 254 11 533 l0 467 -250 0 -250 0 0 -448z"/>
  </g>
</svg>`;
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'jackton_logo.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
